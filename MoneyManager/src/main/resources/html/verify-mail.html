<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f6f8;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 500px;
      margin: 40px auto;
      background: #ffffff;
      padding: 24px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      text-align: center;
    }
    .title {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 16px;
      color: #333;
    }
    .text {
      font-size: 14px;
      color: #555;
      margin-bottom: 24px;
    }
    .button {
      display: inline-block;
      padding: 12px 20px;
      background-color: #4CAF50;
      color: white !important;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
    }
    .footer {
      margin-top: 20px;
      font-size: 12px;
      color: #999;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="title">Activate Your Account</div>
  <div class="text">
    Thank you for signing up for <b>Money Manager</b>.<br><br>
    Please click the button below to activate your account.
  </div>
  <a href="{{ACTIVATION_LINK}}" class="button">Activate Account</a>
  <div class="footer">
    If you didn’t create this account, you can safely ignore this email.
  </div>
</div>
</body>
</html>
