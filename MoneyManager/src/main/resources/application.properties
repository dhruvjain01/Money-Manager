spring.application.name=MoneyManager
app.time-zone=Asia/Kolkata

# ===============================
# PostgreSQL Configuration
# ===============================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.data-source-properties.prepareThreshold=0
spring.datasource.hikari.auto-commit=true

# ===============================
# Server Configuration
# ===============================
server.servlet.context-path=/api/v1.0
server.port=${PORT:8080}

# ===============================
# JPA / Hibernate Configuration
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.properties.hibernate.jdbc.use_streams_for_lob=true
spring.jpa.properties.hibernate.statement_cache.size=0

spring.jpa.properties.hibernate.jdbc.time_zone=${app.time-zone}
spring.task.scheduling.time-zone=${app.time-zone}
spring.jackson.time-zone=${app.time-zone}

# ===============================
# Email Configuration (Brevo API)
# ===============================
brevo.api.key=${BREVO_API_KEY}
brevo.sender.email=${BREVO_SENDER_EMAIL}
brevo.sender.name=${BREVO_SENDER_NAME:Money Manager}

# ===============================
# JWT Configuration
# ===============================
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:900000}
jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION:86400000}

# ===============================
# App URLs
# ===============================
money.manager.backend.url=${MONEY_MANAGER_BACKEND_URL}
money.manager.frontend.url=${MONEY_MANAGER_FRONTEND_URL}

# ===============================
# Cookie Security
# ===============================
app.cookie.secure=${APP_COOKIE_SECURE:false}